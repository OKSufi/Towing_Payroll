<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Towing Payroll System</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        // Icons as simple components
        const Plus = () => <span className="inline-block">➕</span>;
        const Trash2 = () => <span className="inline-block">🗑️</span>;
        const DollarSign = () => <span className="inline-block">💵</span>;
        const TrendingUp = () => <span className="inline-block">📈</span>;
        const Calendar = () => <span className="inline-block">📅</span>;
        const FileText = () => <span className="inline-block">📄</span>;
        const Download = () => <span className="inline-block">📥</span>;

        const DRIVERS = [
          { id: 'akeel', name: 'Akeel', commissionRate: 0, isOwner: true },
          { id: 'travis', name: 'Travis', commissionRate: 0.35, isOwner: false }
        ];

        const AAA_MEMBER_TYPES = ['RV', 'Plus', 'Classic', 'Basic'];

        const IAA_ZONES = [
          { zone: 1, from: 0, to: 5, rate: 60 },
          { zone: 2, from: 6, to: 10, rate: 72 },
          { zone: 3, from: 11, to: 15, rate: 82 },
          { zone: 4, from: 16, to: 20, rate: 92 },
          { zone: 5, from: 21, to: 25, rate: 103 },
          { zone: 6, from: 26, to: 30, rate: 113 },
          { zone: 7, from: 31, to: 35, rate: 124 },
          { zone: 8, from: 36, to: 40, rate: 134 },
          { zone: 9, from: 41, to: 45, rate: 145 },
          { zone: 10, from: 46, to: 50, rate: 155 },
          { zone: 11, from: 51, to: 60, rate: 176 },
          { zone: 12, from: 61, to: 70, rate: 197 },
          { zone: 13, from: 71, to: 80, rate: 218 },
          { zone: 14, from: 81, to: 90, rate: 239 },
          { zone: 15, from: 91, to: 100, rate: 260 },
          { zone: 16, from: 101, to: 110, rate: 281 },
          { zone: 17, from: 111, to: 120, rate: 304 },
          { zone: 18, from: 121, to: 130, rate: 323 },
          { zone: 19, from: 131, to: 140, rate: 344 },
          { zone: 20, from: 141, to: 344, rate: 344 }
        ];

        function TowingPayroll() {
          const [workOrders, setWorkOrders] = useState([]);
          const [advances, setAdvances] = useState({});
          const [showAddOrder, setShowAddOrder] = useState(false);
          const [showDeleteConfirm, setShowDeleteConfirm] = useState(false);
          const [showClearConfirm, setShowClearConfirm] = useState(false);
          const [deleteOrderId, setDeleteOrderId] = useState(null);
          const [currentPayPeriodStart, setCurrentPayPeriodStart] = useState('');
          const [currentPayPeriodEnd, setCurrentPayPeriodEnd] = useState('');
          
          const [newOrder, setNewOrder] = useState({
            invoiceNumber: '',
            date: new Date().toISOString().split('T')[0],
            driverId: 'travis',
            company: 'AAA',
            memberType: 'Plus',
            enrouteMiles: '',
            towMiles: '',
            customerOverage: '',
            customerPaymentMethod: 'Cash',
            iaaZone: '1',
            iaaZone20Miles: '',
            privateAmount: '',
            privatePaymentMethod: 'Cash'
          });

          useEffect(() => {
            try {
              const saved = localStorage.getItem('towingWorkOrders');
              const savedAdvances = localStorage.getItem('towingAdvances');
              if (saved) setWorkOrders(JSON.parse(saved));
              if (savedAdvances) setAdvances(JSON.parse(savedAdvances));
            } catch (error) {
              console.log('localStorage not available');
            }

            const today = new Date();
            const dayOfWeek = today.getDay();
            const monday = new Date(today);
            monday.setDate(today.getDate() - (dayOfWeek === 0 ? 6 : dayOfWeek - 1));
            const sunday = new Date(monday);
            sunday.setDate(monday.getDate() + 6);
            
            setCurrentPayPeriodStart(monday.toISOString().split('T')[0]);
            setCurrentPayPeriodEnd(sunday.toISOString().split('T')[0]);
          }, []);

          useEffect(() => {
            try {
              localStorage.setItem('towingWorkOrders', JSON.stringify(workOrders));
            } catch (error) {
              console.log('localStorage not available');
            }
          }, [workOrders]);

          useEffect(() => {
            try {
              localStorage.setItem('towingAdvances', JSON.stringify(advances));
            } catch (error) {
              console.log('localStorage not available');
            }
          }, [advances]);

          const calculateAAARevenue = (order) => {
            const onHook = 60;
            const enrouteMiles = parseFloat(order.enrouteMiles) || 0;
            const towMiles = parseFloat(order.towMiles) || 0;
            
            let enrouteRevenue = 0;
            let towRevenue = 0;
            
            if (order.memberType === 'Basic') {
              enrouteRevenue = enrouteMiles > 5 ? (enrouteMiles - 5) * 3 : 0;
              const paidTowMiles = Math.min(towMiles > 5 ? towMiles - 5 : 0, 10);
              towRevenue = paidTowMiles * 5;
            } else {
              enrouteRevenue = enrouteMiles > 5 ? (enrouteMiles - 5) * 5 : 0;
              towRevenue = towMiles > 5 ? (towMiles - 5) * 4 : 0;
            }
            
            return onHook + enrouteRevenue + towRevenue;
          };

          const calculateIAARevenue = (order) => {
            const zone = parseInt(order.iaaZone);
            if (zone === 20) {
              const extraMiles = parseFloat(order.iaaZone20Miles) || 0;
              return 344 + (extraMiles * 1.44);
            }
            const zoneData = IAA_ZONES.find(z => z.zone === zone);
            return zoneData ? zoneData.rate : 0;
          };

          const calculatePrivateRevenue = (order) => {
            return parseFloat(order.privateAmount) || 0;
          };

          const calculateRevenue = (order) => {
            if (order.company === 'AAA') return calculateAAARevenue(order);
            if (order.company === 'IAA') return calculateIAARevenue(order);
            if (order.company === 'Private') return calculatePrivateRevenue(order);
            return 0;
          };

          const addWorkOrder = () => {
            if (!newOrder.invoiceNumber || !newOrder.date) {
              alert('Please enter invoice number and date');
              return;
            }

            const order = {
              ...newOrder,
              id: Date.now().toString(),
              revenue: 0
            };
            
            order.revenue = calculateRevenue(order);
            
            setWorkOrders([...workOrders, order]);
            setNewOrder({
              invoiceNumber: '',
              date: new Date().toISOString().split('T')[0],
              driverId: 'travis',
              company: 'AAA',
              memberType: 'Plus',
              enrouteMiles: '',
              towMiles: '',
              customerOverage: '',
              customerPaymentMethod: 'Cash',
              iaaZone: '1',
              iaaZone20Miles: '',
              privateAmount: '',
              privatePaymentMethod: 'Cash'
            });
            setShowAddOrder(false);
          };

          const deleteWorkOrder = (id) => {
            setDeleteOrderId(id);
            setShowDeleteConfirm(true);
          };

          const confirmDelete = () => {
            setWorkOrders(workOrders.filter(order => order.id !== deleteOrderId));
            setShowDeleteConfirm(false);
            setDeleteOrderId(null);
          };

          const clearAllWorkOrders = () => {
            setShowClearConfirm(true);
          };

          const confirmClearAll = () => {
            setWorkOrders([]);
            setAdvances({});
            setShowClearConfirm(false);
          };

          const updateAdvance = (driverId, amount) => {
            setAdvances({ ...advances, [driverId]: parseFloat(amount) || 0 });
          };

          const getPayPeriodOrders = () => {
            return workOrders.filter(order => {
              return order.date >= currentPayPeriodStart && order.date <= currentPayPeriodEnd;
            });
          };

          const calculateDriverStats = (driverId, orders) => {
            const driverOrders = orders.filter(order => order.driverId === driverId);
            const totalRevenue = driverOrders.reduce((sum, order) => sum + order.revenue, 0);
            const driver = DRIVERS.find(d => d.id === driverId);
            const commission = totalRevenue * driver.commissionRate;
            const advance = advances[driverId] || 0;
            const netPay = commission - advance;
            
            return {
              callCount: driverOrders.length,
              totalRevenue,
              commission,
              advance,
              netPay,
              orders: driverOrders
            };
          };

          const calculateYTD = (driverId) => {
            return calculateDriverStats(driverId, workOrders);
          };

          const exportToCSV = () => {
            if (workOrders.length === 0) {
              alert('No work orders to export!');
              return;
            }

            const headers = ['Invoice Number', 'Date', 'Driver', 'Company', 'Member Type/Zone', 'Enroute Miles', 'Tow Miles', 'Revenue'];
            
            const rows = workOrders.map(order => {
              const driver = DRIVERS.find(d => d.id === order.driverId);
              return [
                order.invoiceNumber,
                order.date,
                driver.name,
                order.company,
                order.company === 'AAA' ? order.memberType : (order.company === 'IAA' ? `Zone ${order.iaaZone}` : 'N/A'),
                order.enrouteMiles || 'N/A',
                order.towMiles || 'N/A',
                order.revenue.toFixed(2)
              ];
            });

            const csvContent = [
              headers.join(','),
              ...rows.map(row => row.join(','))
            ].join('\n');

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            
            const filename = `towing_payroll_${currentPayPeriodStart}_to_${currentPayPeriodEnd}.csv`;
            
            link.setAttribute('href', url);
            link.setAttribute('download', filename);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
          };

          const payPeriodOrders = getPayPeriodOrders();
          const payPeriodTotalRevenue = payPeriodOrders.reduce((sum, order) => sum + order.revenue, 0);
          
          const revenueByCompany = {
            AAA: payPeriodOrders.filter(o => o.company === 'AAA').reduce((sum, o) => sum + o.revenue, 0),
            IAA: payPeriodOrders.filter(o => o.company === 'IAA').reduce((sum, o) => sum + o.revenue, 0),
            Private: payPeriodOrders.filter(o => o.company === 'Private').reduce((sum, o) => sum + o.revenue, 0)
          };

          // Sort all work orders by date (newest first)
          const sortedWorkOrders = [...workOrders].sort((a, b) => new Date(b.date) - new Date(a.date));

          return (
            <div className="min-h-screen bg-gradient-to-br from-blue-50 to-gray-100 p-4">
              <div className="max-w-7xl mx-auto">
                <div className="text-center mb-8">
                  <h1 className="text-4xl font-bold text-blue-900 mb-2">🚛 Towing Payroll System</h1>
                  <p className="text-gray-600">Track work orders and calculate driver commissions</p>
                </div>

                <div className="bg-white rounded-xl shadow-lg p-6 mb-6">
                  <div className="flex items-center gap-4 flex-wrap">
                    <div className="flex items-center gap-2">
                      <Calendar />
                      <span className="font-semibold text-gray-700">Pay Period:</span>
                    </div>
                    <input
                      type="date"
                      value={currentPayPeriodStart}
                      onChange={(e) => setCurrentPayPeriodStart(e.target.value)}
                      className="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                    />
                    <span className="text-gray-500">to</span>
                    <input
                      type="date"
                      value={currentPayPeriodEnd}
                      onChange={(e) => setCurrentPayPeriodEnd(e.target.value)}
                      className="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                    />
                    <button
                      onClick={exportToCSV}
                      className="px-6 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors flex items-center gap-2 font-semibold"
                    >
                      <Download /> Export CSV
                    </button>
                    <button
                      onClick={() => setShowAddOrder(true)}
                      className="ml-auto px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors flex items-center gap-2 font-semibold"
                    >
                      <Plus /> Add Work Order
                    </button>
                  </div>
                </div>

                <div className="grid md:grid-cols-4 gap-4 mb-6">
                  <div className="bg-white rounded-xl shadow-lg p-6">
                    <div className="flex items-center gap-3 mb-2">
                      <DollarSign />
                      <h3 className="font-semibold text-gray-700">Total Revenue</h3>
                    </div>
                    <p className="text-3xl font-bold text-green-600">${payPeriodTotalRevenue.toFixed(2)}</p>
                    <p className="text-sm text-gray-500 mt-1">This pay period</p>
                  </div>
                  
                  <div className="bg-white rounded-xl shadow-lg p-6">
                    <div className="flex items-center gap-3 mb-2">
                      <FileText />
                      <h3 className="font-semibold text-gray-700">AAA Revenue</h3>
                    </div>
                    <p className="text-3xl font-bold text-blue-600">${revenueByCompany.AAA.toFixed(2)}</p>
                    <p className="text-sm text-gray-500 mt-1">{payPeriodOrders.filter(o => o.company === 'AAA').length} calls</p>
                  </div>
                  
                  <div className="bg-white rounded-xl shadow-lg p-6">
                    <div className="flex items-center gap-3 mb-2">
                      <FileText />
                      <h3 className="font-semibold text-gray-700">IAA Revenue</h3>
                    </div>
                    <p className="text-3xl font-bold text-purple-600">${revenueByCompany.IAA.toFixed(2)}</p>
                    <p className="text-sm text-gray-500 mt-1">{payPeriodOrders.filter(o => o.company === 'IAA').length} calls</p>
                  </div>
                  
                  <div className="bg-white rounded-xl shadow-lg p-6">
                    <div className="flex items-center gap-3 mb-2">
                      <FileText />
                      <h3 className="font-semibold text-gray-700">Private Revenue</h3>
                    </div>
                    <p className="text-3xl font-bold text-orange-600">${revenueByCompany.Private.toFixed(2)}</p>
                    <p className="text-sm text-gray-500 mt-1">{payPeriodOrders.filter(o => o.company === 'Private').length} calls</p>
                  </div>
                </div>

                {DRIVERS.map(driver => {
                  const payPeriodStats = calculateDriverStats(driver.id, payPeriodOrders);
                  const ytdStats = calculateYTD(driver.id);
                  
                  return (
                    <div key={driver.id} className="bg-white rounded-xl shadow-lg p-6 mb-6">
                      <h2 className="text-2xl font-bold text-gray-800 mb-4">
                        {driver.name} {driver.isOwner && '(Owner)'}
                      </h2>
                      
                      <div className="grid md:grid-cols-2 gap-6 mb-6">
                        <div className="border border-gray-200 rounded-lg p-4">
                          <h3 className="font-semibold text-gray-700 mb-3 flex items-center gap-2">
                            <Calendar />
                            Current Pay Period
                          </h3>
                          <div className="space-y-2">
                            <div className="flex justify-between">
                              <span className="text-gray-600">Total Calls:</span>
                              <span className="font-semibold">{payPeriodStats.callCount}</span>
                            </div>
                            <div className="flex justify-between">
                              <span className="text-gray-600">Total Revenue:</span>
                              <span className="font-semibold text-green-600">${payPeriodStats.totalRevenue.toFixed(2)}</span>
                            </div>
                            {!driver.isOwner && (
                              <>
                                <div className="flex justify-between">
                                  <span className="text-gray-600">Commission ({driver.commissionRate * 100}%):</span>
                                  <span className="font-semibold text-blue-600">${payPeriodStats.commission.toFixed(2)}</span>
                                </div>
                                <div className="flex justify-between items-center">
                                  <span className="text-gray-600">Advances:</span>
                                  <input
                                    type="number"
                                    value={advances[driver.id] || ''}
                                    onChange={(e) => updateAdvance(driver.id, e.target.value)}
                                    placeholder="0.00"
                                    className="w-24 px-2 py-1 border border-gray-300 rounded text-right focus:ring-2 focus:ring-blue-500"
                                  />
                                </div>
                                <div className="flex justify-between pt-2 border-t border-gray-300">
                                  <span className="text-gray-800 font-semibold">Net Pay:</span>
                                  <span className="font-bold text-green-600 text-lg">${payPeriodStats.netPay.toFixed(2)}</span>
                                </div>
                              </>
                            )}
                          </div>
                        </div>

                        <div className="border border-gray-200 rounded-lg p-4 bg-blue-50">
                          <h3 className="font-semibold text-gray-700 mb-3 flex items-center gap-2">
                            <TrendingUp />
                            Year to Date
                          </h3>
                          <div className="space-y-2">
                            <div className="flex justify-between">
                              <span className="text-gray-600">Total Calls:</span>
                              <span className="font-semibold">{ytdStats.callCount}</span>
                            </div>
                            <div className="flex justify-between">
                              <span className="text-gray-600">Total Revenue:</span>
                              <span className="font-semibold text-green-600">${ytdStats.totalRevenue.toFixed(2)}</span>
                            </div>
                            {!driver.isOwner && (
                              <div className="flex justify-between">
                                <span className="text-gray-600">Total Commission:</span>
                                <span className="font-semibold text-blue-600">${ytdStats.commission.toFixed(2)}</span>
                              </div>
                            )}
                          </div>
                        </div>
                      </div>

                      {payPeriodStats.orders.length > 0 && (
                        <div>
                          <h4 className="font-semibold text-gray-700 mb-3">Work Orders This Period:</h4>
                          <div className="overflow-x-auto">
                            <table className="w-full text-sm">
                              <thead className="bg-gray-100">
                                <tr>
                                  <th className="px-3 py-2 text-left">Invoice #</th>
                                  <th className="px-3 py-2 text-left">Date</th>
                                  <th className="px-3 py-2 text-left">Company</th>
                                  <th className="px-3 py-2 text-left">Details</th>
                                  <th className="px-3 py-2 text-right">Revenue</th>
                                  <th className="px-3 py-2"></th>
                                </tr>
                              </thead>
                              <tbody>
                                {payPeriodStats.orders.map(order => (
                                  <tr key={order.id} className="border-b border-gray-200 hover:bg-gray-50">
                                    <td className="px-3 py-2">{order.invoiceNumber}</td>
                                    <td className="px-3 py-2">{order.date}</td>
                                    <td className="px-3 py-2">
                                      <span className={`px-2 py-1 rounded text-xs font-semibold ${
                                        order.company === 'AAA' ? 'bg-blue-100 text-blue-700' :
                                        order.company === 'IAA' ? 'bg-purple-100 text-purple-700' :
                                        'bg-orange-100 text-orange-700'
                                      }`}>
                                        {order.company}
                                      </span>
                                    </td>
                                    <td className="px-3 py-2 text-xs text-gray-600">
                                      {order.company === 'AAA' && `${order.memberType}, Enroute: ${order.enrouteMiles}mi, Tow: ${order.towMiles}mi`}
                                      {order.company === 'IAA' && `Zone ${order.iaaZone}${order.iaaZone === '20' ? ` + ${order.iaaZone20Miles}mi` : ''}`}
                                      {order.company === 'Private' && `${order.privatePaymentMethod}`}
                                    </td>
                                    <td className="px-3 py-2 text-right font-semibold text-green-600">
                                      ${order.revenue.toFixed(2)}
                                    </td>
                                    <td className="px-3 py-2">
                                      <button
                                        onClick={() => deleteWorkOrder(order.id)}
                                        className="p-1 text-red-500 hover:bg-red-50 rounded"
                                      >
                                        <Trash2 />
                                      </button>
                                    </td>
                                  </tr>
                                ))}
                              </tbody>
                            </table>
                          </div>
                        </div>
                      )}
                    </div>
                  );
                })}

                {/* Complete Work Orders List */}
                {sortedWorkOrders.length > 0 && (
                  <div className="bg-white rounded-xl shadow-lg p-6 mb-6">
                    <div className="flex justify-between items-center mb-4">
                      <h2 className="text-2xl font-bold text-gray-800">📋 All Work Orders ({sortedWorkOrders.length} total)</h2>
                      <button
                        onClick={clearAllWorkOrders}
                        style={{ backgroundColor: '#dc2626' }}
                        className="px-6 py-3 text-white rounded-lg hover:opacity-90 transition-opacity font-bold text-lg flex items-center gap-2 shadow-lg"
                      >
                        <Trash2 /> CLEAR LIST
                      </button>
                    </div>
                    
                    <div className="overflow-x-auto">
                      <table className="w-full text-sm">
                        <thead className="bg-gray-100">
                          <tr>
                            <th className="px-3 py-2 text-left">Driver</th>
                            <th className="px-3 py-2 text-left">Invoice #</th>
                            <th className="px-3 py-2 text-left">Date</th>
                            <th className="px-3 py-2 text-left">Company</th>
                            <th className="px-3 py-2 text-left">Details</th>
                            <th className="px-3 py-2 text-right">Commission</th>
                            <th className="px-3 py-2 text-right">Revenue</th>
                          </tr>
                        </thead>
                        <tbody>
                          {sortedWorkOrders.map(order => {
                            const driver = DRIVERS.find(d => d.id === order.driverId);
                            const commission = order.revenue * driver.commissionRate;
                            return (
                              <tr key={order.id} className="border-b border-gray-200 hover:bg-gray-50">
                                <td className="px-3 py-2 font-semibold">{driver.name}</td>
                                <td className="px-3 py-2">{order.invoiceNumber}</td>
                                <td className="px-3 py-2">{order.date}</td>
                                <td className="px-3 py-2">
                                  <span className={`px-2 py-1 rounded text-xs font-semibold ${
                                    order.company === 'AAA' ? 'bg-blue-100 text-blue-700' :
                                    order.company === 'IAA' ? 'bg-purple-100 text-purple-700' :
                                    'bg-orange-100 text-orange-700'
                                  }`}>
                                    {order.company}
                                  </span>
                                </td>
                                <td className="px-3 py-2 text-xs text-gray-600">
                                  {order.company === 'AAA' && `${order.memberType}, Enroute: ${order.enrouteMiles}mi, Tow: ${order.towMiles}mi`}
                                  {order.company === 'IAA' && `Zone ${order.iaaZone}${order.iaaZone === '20' ? ` + ${order.iaaZone20Miles}mi` : ''}`}
                                  {order.company === 'Private' && `Amount: $${order.privateAmount}, ${order.privatePaymentMethod}`}
                                </td>
                                <td className="px-3 py-2 text-right font-semibold text-blue-600">
                                  ${commission.toFixed(2)}
                                </td>
                                <td className="px-3 py-2 text-right font-semibold text-green-600">
                                  ${order.revenue.toFixed(2)}
                                </td>
                              </tr>
                            );
                          })}
                        </tbody>
                        <tfoot className="bg-gray-50 font-bold">
                          <tr>
                            <td colSpan="5" className="px-3 py-3 text-right text-lg">TOTAL:</td>
                            <td className="px-3 py-3 text-right text-blue-600 text-lg">
                              ${sortedWorkOrders.reduce((sum, order) => {
                                const driver = DRIVERS.find(d => d.id === order.driverId);
                                return sum + (order.revenue * driver.commissionRate);
                              }, 0).toFixed(2)}
                            </td>
                            <td className="px-3 py-3 text-right text-green-600 text-lg">
                              ${sortedWorkOrders.reduce((sum, order) => sum + order.revenue, 0).toFixed(2)}
                            </td>
                          </tr>
                        </tfoot>
                      </table>
                    </div>
                  </div>
                )}

                {/* Delete Confirmation Modal */}
                {showDeleteConfirm && (
                  <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
                    <div className="bg-white rounded-xl shadow-2xl max-w-md w-full p-6">
                      <h3 className="text-xl font-bold text-gray-800 mb-4">⚠️ Confirm Delete</h3>
                      <p className="text-gray-600 mb-6">Are you sure you want to delete this work order? This action cannot be undone.</p>
                      <div className="flex gap-3">
                        <button
                          onClick={() => {
                            setShowDeleteConfirm(false);
                            setDeleteOrderId(null);
                          }}
                          className="flex-1 px-6 py-3 bg-gray-300 text-gray-700 rounded-lg hover:bg-gray-400 transition-colors font-semibold"
                        >
                          Cancel
                        </button>
                        <button
                          onClick={confirmDelete}
                          className="flex-1 px-6 py-3 bg-red-600 text-white rounded-lg hover:bg-red-700 transition-colors font-semibold"
                        >
                          Delete
                        </button>
                      </div>
                    </div>
                  </div>
                )}

                {/* Clear All Confirmation Modal */}
                {showClearConfirm && (
                  <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
                    <div className="bg-white rounded-xl shadow-2xl max-w-md w-full p-6">
                      <h3 className="text-xl font-bold text-red-600 mb-4">🚨 CLEAR ALL DATA</h3>
                      <p className="text-gray-800 font-semibold mb-4">Are you ABSOLUTELY SURE you want to clear ALL work orders and advances?</p>
                      <p className="text-gray-600 mb-6">This will permanently delete {workOrders.length} work order{workOrders.length !== 1 ? 's' : ''} and all advance data. This action CANNOT be undone!</p>
                      <div className="flex gap-3">
                        <button
                          onClick={() => setShowClearConfirm(false)}
                          className="flex-1 px-6 py-3 bg-gray-300 text-gray-700 rounded-lg hover:bg-gray-400 transition-colors font-semibold"
                        >
                          Cancel
                        </button>
                        <button
                          onClick={confirmClearAll}
                          className="flex-1 px-6 py-3 bg-red-600 text-white rounded-lg hover:bg-red-700 transition-colors font-bold"
                        >
                          YES, DELETE ALL
                        </button>
                      </div>
                    </div>
                  </div>
                )}

                {/* Add Work Order Modal */}
                {showAddOrder && (
                  <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
                    <div className="bg-white rounded-xl shadow-2xl max-w-2xl w-full max-h-screen overflow-y-auto p-6">
                      <h3 className="text-2xl font-bold text-gray-800 mb-4">Add Work Order</h3>
                      
                      <div className="space-y-4">
                        <div className="grid md:grid-cols-2 gap-4">
                          <div>
                            <label className="block text-sm font-semibold text-gray-700 mb-2">Invoice Number</label>
                            <input
                              type="text"
                              value={newOrder.invoiceNumber}
                              onChange={(e) => setNewOrder({ ...newOrder, invoiceNumber: e.target.value })}
                              className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                              placeholder="INV-001"
                            />
                          </div>
                          <div>
                            <label className="block text-sm font-semibold text-gray-700 mb-2">Date</label>
                            <input
                              type="date"
                              value={newOrder.date}
                              onChange={(e) => setNewOrder({ ...newOrder, date: e.target.value })}
                              className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                            />
                          </div>
                        </div>

                        <div className="grid md:grid-cols-2 gap-4">
                          <div>
                            <label className="block text-sm font-semibold text-gray-700 mb-2">Driver</label>
                            <select
                              value={newOrder.driverId}
                              onChange={(e) => setNewOrder({ ...newOrder, driverId: e.target.value })}
                              className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                            >
                              {DRIVERS.map(driver => (
                                <option key={driver.id} value={driver.id}>{driver.name}</option>
                              ))}
                            </select>
                          </div>
                          <div>
                            <label className="block text-sm font-semibold text-gray-700 mb-2">Company</label>
                            <select
                              value={newOrder.company}
                              onChange={(e) => setNewOrder({ ...newOrder, company: e.target.value })}
                              className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                            >
                              <option value="AAA">AAA</option>
                              <option value="IAA">IAA</option>
                              <option value="Private">Private</option>
                            </select>
                          </div>
                        </div>

                        {newOrder.company === 'AAA' && (
                          <>
                            <div>
                              <label className="block text-sm font-semibold text-gray-700 mb-2">Member Type</label>
                              <select
                                value={newOrder.memberType}
                                onChange={(e) => setNewOrder({ ...newOrder, memberType: e.target.value })}
                                className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                              >
                                {AAA_MEMBER_TYPES.map(type => (
                                  <option key={type} value={type}>{type}</option>
                                ))}
                              </select>
                            </div>
                            <div className="grid md:grid-cols-2 gap-4">
                              <div>
                                <label className="block text-sm font-semibold text-gray-700 mb-2">Enroute Miles</label>
                                <input
                                  type="number"
                                  step="0.1"
                                  value={newOrder.enrouteMiles}
                                  onChange={(e) => setNewOrder({ ...newOrder, enrouteMiles: e.target.value })}
                                  className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                                  placeholder="0.0"
                                />
                              </div>
                              <div>
                                <label className="block text-sm font-semibold text-gray-700 mb-2">Tow Miles</label>
                                <input
                                  type="number"
                                  step="0.1"
                                  value={newOrder.towMiles}
                                  onChange={(e) => setNewOrder({ ...newOrder, towMiles: e.target.value })}
                                  className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                                  placeholder="0.0"
                                />
                              </div>
                            </div>
                            {newOrder.memberType === 'Basic' && parseFloat(newOrder.towMiles) > 10 && (
                              <div className="grid md:grid-cols-2 gap-4 bg-yellow-50 p-4 rounded-lg">
                                <div>
                                  <label className="block text-sm font-semibold text-gray-700 mb-2">Customer Overage Payment</label>
                                  <input
                                    type="number"
                                    step="0.01"
                                    value={newOrder.customerOverage}
                                    onChange={(e) => setNewOrder({ ...newOrder, customerOverage: e.target.value })}
                                    className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                                    placeholder="0.00"
                                  />
                                </div>
                                <div>
                                  <label className="block text-sm font-semibold text-gray-700 mb-2">Payment Method</label>
                                  <select
                                    value={newOrder.customerPaymentMethod}
                                    onChange={(e) => setNewOrder({ ...newOrder, customerPaymentMethod: e.target.value })}
                                    className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                                  >
                                    <option value="Cash">Cash</option>
                                    <option value="Card">Card</option>
                                  </select>
                                </div>
                              </div>
                            )}
                          </>
                        )}

                        {newOrder.company === 'IAA' && (
                          <>
                            <div>
                              <label className="block text-sm font-semibold text-gray-700 mb-2">Zone</label>
                              <select
                                value={newOrder.iaaZone}
                                onChange={(e) => setNewOrder({ ...newOrder, iaaZone: e.target.value })}
                                className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                              >
                                {IAA_ZONES.map(zone => (
                                  <option key={zone.zone} value={zone.zone}>
                                    Zone {zone.zone} ({zone.from}-{zone.to} miles) - ${zone.rate}
                                  </option>
                                ))}
                              </select>
                            </div>
                            {newOrder.iaaZone === '20' && (
                              <div>
                                <label className="block text-sm font-semibold text-gray-700 mb-2">Miles Over 344</label>
                                <input
                                  type="number"
                                  step="0.1"
                                  value={newOrder.iaaZone20Miles}
                                  onChange={(e) => setNewOrder({ ...newOrder, iaaZone20Miles: e.target.value })}
                                  className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                                  placeholder="0.0"
                                />
                                <p className="text-sm text-gray-500 mt-1">Rate: $344 + $1.44/mile over 344</p>
                              </div>
                            )}
                          </>
                        )}

                        {newOrder.company === 'Private' && (
                          <div className="grid md:grid-cols-2 gap-4">
                            <div>
                              <label className="block text-sm font-semibold text-gray-700 mb-2">Amount</label>
                              <input
                                type="number"
                                step="0.01"
                                value={newOrder.privateAmount}
                                onChange={(e) => setNewOrder({ ...newOrder, privateAmount: e.target.value })}
                                className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                                placeholder="0.00"
                              />
                            </div>
                            <div>
                              <label className="block text-sm font-semibold text-gray-700 mb-2">Payment Method</label>
                              <select
                                value={newOrder.privatePaymentMethod}
                                onChange={(e) => setNewOrder({ ...newOrder, privatePaymentMethod: e.target.value })}
                                className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                              >
                                <option value="Cash">Cash</option>
                                <option value="Card">Card</option>
                              </select>
                            </div>
                          </div>
                        )}

                        <div className="flex gap-3 pt-4">
                          <button
                            onClick={() => {
                              setShowAddOrder(false);
                              setNewOrder({
                                invoiceNumber: '',
                                date: new Date().toISOString().split('T')[0],
                                driverId: 'travis',
                                company: 'AAA',
                                memberType: 'Plus',
                                enrouteMiles: '',
                                towMiles: '',
                                customerOverage: '',
                                customerPaymentMethod: 'Cash',
                                iaaZone: '1',
                                iaaZone20Miles: '',
                                privateAmount: '',
                                privatePaymentMethod: 'Cash'
                              });
                            }}
                            className="flex-1 px-6 py-3 bg-gray-300 text-gray-700 rounded-lg hover:bg-gray-400 transition-colors font-semibold"
                          >
                            Cancel
                          </button>
                          <button
                            onClick={addWorkOrder}
                            className="flex-1 px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-semibold"
                          >
                            Add Work Order
                          </button>
                        </div>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TowingPayroll />);
    </script>
</body>
</html>
